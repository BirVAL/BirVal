<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>BirVal v48 Institutional Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0b0f1c;
color:white;
font-family:monospace;
}

.header{
text-align:center;
padding:6px;
font-size:18px;
color:#93c5fd;
border-bottom:1px solid #60a5fa;
}

.layout{
display:grid;
grid-template-columns:200px auto;
grid-template-rows:520px auto;
height:100vh;
}

.watch{
grid-column:1;
grid-row:1;
overflow:auto;
border-right:1px solid #60a5fa;
background:#0f1629;
padding:5px;
}

.coin{
border:1px solid #60a5fa;
padding:4px;
margin-bottom:4px;
cursor:pointer;
font-size:11px;
}

.coin:hover{
background:#1b2748;
}

.chart{
grid-column:2;
grid-row:1;
}

.modules{
grid-column:2;
grid-row:2;
display:grid;
grid-template-columns:repeat(9,1fr);
gap:5px;
padding:5px;
}

.panel{
border:1px solid #60a5fa;
background:#0f1629;
}

.panel-header{
padding:4px;
color:#93c5fd;
border-bottom:1px solid #60a5fa;
}

.panel-body{
padding:5px;
font-size:11px;
}

.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#facc15}
.orange{color:#fb923c}

</style>

</head>

<body>

<div class="header">
BirVal v48 Institutional Intelligence Terminal
</div>

<div class="layout">

<div class="watch" id="watchlist"></div>
<div class="chart" id="chart"></div>

<div class="modules">

<div class="panel">
<div class="panel-header">Opportunity Radar</div>
<div class="panel-body" id="radar"></div>
</div>

<div class="panel">
<div class="panel-header">Derivatives Intelligence</div>
<div class="panel-body" id="derivatives"></div>
</div>

<div class="panel">
<div class="panel-header">Orderflow Engine</div>
<div class="panel-body" id="orderflow"></div>
</div>

<div class="panel">
<div class="panel-header">Smart Money</div>
<div class="panel-body" id="smart"></div>
</div>

<div class="panel">
<div class="panel-header">Liquidity Intelligence</div>
<div class="panel-body" id="liq"></div>
</div>

<div class="panel">
<div class="panel-header">Market Structure</div>
<div class="panel-body" id="structure"></div>
</div>

<div class="panel">
<div class="panel-header">Macro Dashboard</div>
<div class="panel-body" id="macro"></div>
</div>

<div class="panel">
<div class="panel-header">Liquidity Heatmap</div>
<div class="panel-body" id="heat"></div>
</div>

<div class="panel">
<div class="panel-header">Orderbook Walls</div>
<div class="panel-body" id="walls"></div>
</div>

</div>

</div>

<script>

let widget

function loadChart(symbol){

widget=new TradingView.widget({
symbol:symbol,
interval:"60",
container_id:"chart",
theme:"dark",
autosize:true
})

}

function changeSymbol(symbol){

loadChart("BINANCE:"+symbol)

}

loadChart("BINANCE:BTCUSDT")

const coins=[
"BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","DOGEUSDT",
"TONUSDT","LINKUSDT","TRXUSDT","NEARUSDT","APTUSDT",
"INJUSDT","ARBUSDT","SUIUSDT","AAVEUSDT","HBARUSDT","TAOUSDT"
]

coins.forEach(symbol=>{
let div=document.createElement("div")
div.className="coin"
div.innerText=symbol
div.onclick=()=>changeSymbol(symbol)
watchlist.appendChild(div)
})

let market=[]
let fundingData=[]

async function loadMarket(){

const res=await fetch("https://fapi.binance.com/fapi/v1/ticker/24hr")
market=await res.json()

const fund=await fetch("https://fapi.binance.com/fapi/v1/premiumIndex")
fundingData=await fund.json()

runRadar()
runDerivatives()
runOrderflow()
runSmartMoney()
runLiquidity()
runStructure()
runMacro()
runHeatmap()
runWalls()

}

/* RADAR */

function runRadar(){

let html=""

coins.forEach(symbol=>{

let asset=market.find(a=>a.symbol===symbol)
if(!asset) return

let move=Math.abs(asset.priceChangePercent)
let volume=Number(asset.quoteVolume)

if(volume<120000000) return

let score=move*10 + volume/10000000

if(score<40) return

html+=`<div class="yellow">${symbol} Score ${score.toFixed(0)}</div>`

})

radar.innerHTML=html

}

/* DERIVATIVES */

function runDerivatives(){

let html=""

fundingData.slice(0,10).forEach(f=>{

html+=`<div>${f.symbol} ${(f.lastFundingRate*100).toFixed(3)}%</div>`

})

derivatives.innerHTML=html

}

/* ORDERFLOW */

function runOrderflow(){

let html=""

coins.forEach(symbol=>{

let asset=market.find(a=>a.symbol===symbol)
if(!asset) return

let vol=Number(asset.quoteVolume)
let move=Math.abs(asset.priceChangePercent)

if(vol>200000000 && move>3)
html+=`<div class="green">Aggressive Orders ${symbol}</div>`

})

orderflow.innerHTML=html

}

/* SMART MONEY */

function runSmartMoney(){

let html=""

coins.forEach(symbol=>{

let asset=market.find(a=>a.symbol===symbol)
if(!asset) return

let vol=Number(asset.quoteVolume)

if(vol>250000000)
html+=`<div class="yellow">Whale Flow ${symbol}</div>`

})

smart.innerHTML=html

}

/* LIQUIDITY */

function runLiquidity(){

let html=""

coins.forEach(symbol=>{

let asset=market.find(a=>a.symbol===symbol)
if(!asset) return

let vol=Number(asset.quoteVolume)

if(vol>300000000)
html+=`<div class="orange">Liquidity Wall ${symbol}</div>`

})

liq.innerHTML=html

}

/* MARKET STRUCTURE */

function runStructure(){

let btc=market.find(a=>a.symbol==="BTCUSDT")

let move=btc.priceChangePercent

let regime=""

if(move>2) regime="BULL TREND"
else if(move<-2) regime="BEAR TREND"
else regime="ACCUMULATION"

structure.innerHTML=regime

}

/* MACRO */

function runMacro(){

let btc=market.find(a=>a.symbol==="BTCUSDT")

macro.innerHTML=`BTC 24h: ${btc.priceChangePercent}%`

}

/* HEATMAP */

function runHeatmap(){

let html=""

market.slice(0,20).forEach(c=>{

let color=c.priceChangePercent>0?"green":"red"

html+=`<span class="${color}">${c.symbol}</span> `

})

heat.innerHTML=html

}

/* ORDERBOOK WALLS */

function runWalls(){

let html=""

coins.forEach(symbol=>{

let asset=market.find(a=>a.symbol===symbol)
if(!asset) return

let vol=Number(asset.quoteVolume)

if(vol>350000000)
html+=`<div>Orderbook Wall ${symbol}</div>`

})

walls.innerHTML=html

}

loadMarket()

setInterval(loadMarket,30000)

</script>

</body>
</html>
