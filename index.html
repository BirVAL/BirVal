<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>BirVal v43 Institutional Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0b0f1c;
color:white;
font-family:monospace;
}

/* HEADER */

.header{
text-align:center;
padding:6px;
font-size:18px;
color:#93c5fd;
border-bottom:1px solid #60a5fa;
}

/* LAYOUT */

.layout{
display:grid;
grid-template-columns:180px auto;
grid-template-rows:520px auto;
height:100vh;
}

/* WATCHLIST */

.watch{
grid-column:1;
grid-row:1;
overflow:auto;
border-right:1px solid #60a5fa;
background:#0f1629;
padding:5px;
}

.coin{
border:1px solid #60a5fa;
padding:4px;
margin-bottom:4px;
cursor:pointer;
font-size:11px;
}

.coin:hover{
background:#1b2748;
}

/* CHART */

.chart{
grid-column:2;
grid-row:1;
}

/* BOT */

.bot{
grid-column:1;
grid-row:2;
overflow:auto;
border-right:1px solid #60a5fa;
background:#0f1629;
padding:5px;
font-size:11px;
}

/* MODULES */

.modules{
grid-column:2;
grid-row:2;
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
padding:5px;
}

/* PANEL */

.panel{
border:1px solid #60a5fa;
background:#0f1629;
}

.panel-header{
padding:4px;
cursor:pointer;
color:#93c5fd;
border-bottom:1px solid #60a5fa;
}

.panel-header:hover{
background:#1b2748;
}

.panel-body{
display:none;
padding:5px;
font-size:11px;
}

/* COLORS */

.green{color:#22c55e}
.red{color:#ef4444}

input{
width:80px;
margin:2px;
background:#111827;
border:1px solid #60a5fa;
color:white;
}

button{
background:#60a5fa;
border:none;
padding:4px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

BirVal v43 Institutional Terminal

</div>

<div class="layout">

<div class="watch" id="watchlist"></div>

<div class="chart" id="chart"></div>

<div class="bot" id="botFeed"></div>

<div class="modules">

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Trade Calculator</div>
<div class="panel-body">

Entry <input id="entry">
Leverage <input id="lev">
SL % <input id="sl">
<button onclick="calc()">Calc</button>

<div id="calcResult"></div>

</div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Opportunity Radar</div>
<div class="panel-body" id="radar"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Open Interest</div>
<div class="panel-body" id="oi"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Funding Rate</div>
<div class="panel-body" id="funding"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">CVD</div>
<div class="panel-body" id="cvd"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Liquidations</div>
<div class="panel-body" id="liq"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Market Heatmap</div>
<div class="panel-body" id="heatmap"></div>
</div>

</div>

</div>

<script>

/* PANEL TOGGLE */

function togglePanel(h){

let b=h.nextElementSibling

b.style.display=b.style.display==="block"?"none":"block"

}

/* TRADINGVIEW */

let widget=new TradingView.widget({
symbol:"BINANCE:BTCUSDT",
interval:"60",
container_id:"chart",
theme:"dark",
autosize:true
})

function changeSymbol(s){

widget=new TradingView.widget({
symbol:"BINANCE:"+s,
interval:"60",
container_id:"chart",
theme:"dark",
autosize:true
})

}

/* WATCHLIST */

const coins=["BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT","ADAUSDT","DOGEUSDT","AVAXUSDT"]

coins.forEach(c=>{
watchlist.innerHTML+=`
<div class="coin" onclick="changeSymbol('${c}')">${c}</div>
`
})

/* CALCULATOR */

function calc(){

let entry=Number(document.getElementById("entry").value)

let lev=Number(document.getElementById("lev").value)

let sl=Number(document.getElementById("sl").value)

let liq=entry-(entry/lev)

calcResult.innerHTML=`

Liquidation ${liq.toFixed(2)}

Stop Loss ${(entry*(1-sl/100)).toFixed(2)}

`

}

/* MARKET ENGINE */

let market=[]

async function marketEngine(){

const res=await fetch("https://fapi.binance.com/fapi/v1/ticker/24hr")

market=await res.json()

updateRadar()
updateHeatmap()

}

/* RADAR */

function updateRadar(){

let top=market
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>b.quoteVolume-a.quoteVolume)
.slice(0,10)

let html=""

top.forEach(c=>{

let color=c.priceChangePercent>0?"green":"red"

html+=`<div class="${color}">${c.symbol} ${c.priceChangePercent}%</div>`

})

radar.innerHTML=html

}

/* HEATMAP */

function updateHeatmap(){

let html=""

market.slice(0,30).forEach(c=>{

let color=c.priceChangePercent>0?"green":"red"

html+=`<span class="${color}">${c.symbol}</span> `

})

heatmap.innerHTML=html

}

/* BOT */

function bot(){

let btc=market.find(c=>c.symbol==="BTCUSDT")

if(!btc)return

let dir=btc.priceChangePercent>1?"LONG":"SHORT"

let html=`
${dir}
BTCUSDT
${btc.priceChangePercent.toFixed(2)}%
${new Date().toLocaleTimeString()}
`

let d=document.createElement("div")

d.innerHTML=html

botFeed.prepend(d)

}

/* LOOPS */

marketEngine()

setInterval(marketEngine,30000)

setInterval(bot,60000)

</script>

</body>

</html>
