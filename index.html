<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>BirVal v43 Institutional AI Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0b0f1c;
color:white;
font-family:monospace;
}

/* HEADER */

.header{
text-align:center;
padding:6px;
font-size:18px;
color:#93c5fd;
border-bottom:1px solid #60a5fa;
}

/* LAYOUT */

.layout{
display:grid;
grid-template-columns:180px auto;
grid-template-rows:520px auto;
height:100vh;
}

/* WATCHLIST */

.watch{
grid-column:1;
grid-row:1;
overflow:auto;
border-right:1px solid #60a5fa;
background:#0f1629;
padding:5px;
}

.coin{
border:1px solid #60a5fa;
padding:4px;
margin-bottom:4px;
cursor:pointer;
font-size:11px;
}

.coin:hover{
background:#1b2748;
}

/* CHART */

.chart{
grid-column:2;
grid-row:1;
}

/* BOT */

.bot{
grid-column:1;
grid-row:2;
overflow:auto;
border-right:1px solid #60a5fa;
padding:5px;
background:#0f1629;
font-size:11px;
}

/* MODULES */

.modules{
grid-column:2;
grid-row:2;
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
padding:5px;
}

/* PANEL */

.panel{
border:1px solid #60a5fa;
background:#0f1629;
}

.panel-header{
padding:4px;
cursor:pointer;
color:#93c5fd;
border-bottom:1px solid #60a5fa;
}

.panel-header:hover{
background:#1b2748;
}

.panel-body{
display:none;
padding:5px;
font-size:11px;
}

/* COLORS */

.green{color:#22c55e}
.red{color:#ef4444}

</style>

</head>

<body>

<div class="header">

BirVal v43 Institutional AI Terminal

</div>

<div class="layout">

<div class="watch" id="watchlist"></div>

<div class="chart" id="chart"></div>

<div class="bot" id="botFeed"></div>

<div class="modules">

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Trade Calculator</div>
<div class="panel-body" id="calculator"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Opportunity Radar</div>
<div class="panel-body" id="radar"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Open Interest</div>
<div class="panel-body" id="oi"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Funding Rate</div>
<div class="panel-body" id="funding"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">CVD</div>
<div class="panel-body" id="cvd"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Liquidations</div>
<div class="panel-body" id="liq"></div>
</div>

<div class="panel">
<div class="panel-header" onclick="togglePanel(this)">Market Heatmap</div>
<div class="panel-body" id="heatmap"></div>
</div>

</div>

</div>

<script>

/* PANEL TOGGLE */

function togglePanel(header){

const body = header.nextElementSibling

body.style.display =
body.style.display==="block"?"none":"block"

}

/* TRADINGVIEW */

let widget=new TradingView.widget({
symbol:"BINANCE:BTCUSDT",
interval:"60",
container_id:"chart",
theme:"dark",
autosize:true
})

function changeSymbol(s){

widget=new TradingView.widget({
symbol:"BINANCE:"+s,
interval:"60",
container_id:"chart",
theme:"dark",
autosize:true
})

}

/* WATCHLIST */

const coins=[
"BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT",
"XRPUSDT","ADAUSDT","DOGEUSDT","AVAXUSDT",
"LINKUSDT","DOTUSDT","TONUSDT","HBARUSDT",
"TAOUSDT","APTUSDT","INJUSDT","RNDRUSDT"
]

coins.forEach(c=>{
watchlist.innerHTML+=`
<div class="coin" onclick="changeSymbol('${c}')">${c}</div>
`
})

/* GLOBAL MARKET */

let market=[]

/* MARKET ENGINE */

async function marketEngine(){

const res=await fetch(
"https://fapi.binance.com/fapi/v1/ticker/24hr"
)

market=await res.json()

updateRadar()
updateHeatmap()
aiProbability()
manipulation()

}

/* RADAR */

function updateRadar(){

let top=market
.filter(c=>c.symbol.endsWith("USDT"))
.sort((a,b)=>b.quoteVolume-a.quoteVolume)
.slice(0,15)

let html=""

top.forEach(c=>{

let color=c.priceChangePercent>0?"green":"red"

html+=`
<div class="${color}">
${c.symbol}
${Number(c.priceChangePercent).toFixed(2)}%
</div>
`

})

radar.innerHTML=html

}

/* HEATMAP */

function updateHeatmap(){

let html=""

market.slice(0,40).forEach(c=>{

let color=c.priceChangePercent>0?"green":"red"

html+=`<span class="${color}">${c.symbol}</span> `

})

heatmap.innerHTML=html

}

/* FUNDING */

async function fundingRate(){

const res=await fetch(
"https://fapi.binance.com/fapi/v1/premiumIndex"
)

const data=await res.json()

let html=""

data.slice(0,10).forEach(c=>{

html+=`
<div>
${c.symbol}
${(c.lastFundingRate*100).toFixed(3)}%
</div>
`

})

funding.innerHTML=html

}

/* OPEN INTEREST */

async function openInterest(){

const res=await fetch(
"https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT"
)

const data=await res.json()

oi.innerHTML="BTCUSDT OI "+Number(data.openInterest).toFixed(0)

}

/* CVD */

async function cvdEngine(){

const res=await fetch(
"https://fapi.binance.com/fapi/v1/trades?symbol=BTCUSDT&limit=200"
)

const trades=await res.json()

let delta=0

trades.forEach(t=>{
if(t.isBuyerMaker){
delta-=Number(t.qty)
}else{
delta+=Number(t.qty)
}
})

cvd.innerHTML="Delta "+delta.toFixed(2)

}

/* AI PROBABILITY */

function aiProbability(){

let btc=market.find(c=>c.symbol==="BTCUSDT")

if(!btc)return

let score=0

if(Math.abs(btc.priceChangePercent)>2) score+=40
if(btc.quoteVolume>500000000) score+=30

score+=Math.random()*30

probability="Score "+score.toFixed(0)+"%"

}

/* MANIPULATION */

function manipulation(){

let btc=market.find(c=>c.symbol==="BTCUSDT")

if(!btc)return

let move=Math.abs(btc.priceChangePercent)

if(move>4){

liq.innerHTML="⚠ Possible Whale Activity"

}else{

liq.innerHTML="Normal Market"

}

}

/* BOT */

function bot(){

let btc=market.find(c=>c.symbol==="BTCUSDT")

if(!btc)return

let dir=btc.priceChangePercent>1?"LONG":"SHORT"

let html=`
${dir}
BTCUSDT
${btc.priceChangePercent.toFixed(2)}%
${new Date().toLocaleTimeString()}
`

let d=document.createElement("div")

d.innerHTML=html

botFeed.prepend(d)

}

/* ENGINE LOOP */

marketEngine()
fundingRate()
openInterest()

setInterval(marketEngine,30000)
setInterval(fundingRate,60000)
setInterval(openInterest,60000)
setInterval(cvdEngine,15000)
setInterval(bot,60000)

</script>

</body>

</html>
