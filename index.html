<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>BirVal v45 Institutional Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
background:#0b0f1c;
color:white;
font-family:monospace;
}

.header{
text-align:center;
padding:6px;
font-size:18px;
color:#93c5fd;
border-bottom:1px solid #60a5fa;
}

.layout{
display:grid;
grid-template-columns:200px auto;
grid-template-rows:520px auto;
height:100vh;
}

.watch{
grid-column:1;
grid-row:1;
overflow:auto;
border-right:1px solid #60a5fa;
background:#0f1629;
padding:5px;
}

.coin{
border:1px solid #60a5fa;
padding:4px;
margin-bottom:4px;
cursor:pointer;
font-size:11px;
}

.coin:hover{
background:#1b2748;
}

.chart{
grid-column:2;
grid-row:1;
}

.bot{
grid-column:1;
grid-row:2;
overflow:auto;
border-right:1px solid #60a5fa;
background:#0f1629;
padding:5px;
font-size:11px;
}

.modules{
grid-column:2;
grid-row:2;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
padding:5px;
}

.panel{
border:1px solid #60a5fa;
background:#0f1629;
}

.panel-header{
padding:4px;
cursor:pointer;
color:#93c5fd;
border-bottom:1px solid #60a5fa;
}

.panel-body{
display:block;
padding:5px;
font-size:11px;
}

.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#facc15}
.orange{color:#fb923c}

</style>

</head>

<body>

<div class="header">
BirVal v45 Institutional Terminal
</div>

<div class="layout">

<div class="watch" id="watchlist"></div>
<div class="chart" id="chart"></div>
<div class="bot" id="botFeed"></div>

<div class="modules">

<div class="panel">
<div class="panel-header">Institutional Radar</div>
<div class="panel-body" id="radar"></div>
</div>

<div class="panel">
<div class="panel-header">Liquidity Engine</div>
<div class="panel-body" id="liquidity"></div>
</div>

<div class="panel">
<div class="panel-header">Funding Monitor</div>
<div class="panel-body" id="funding"></div>
</div>

<div class="panel">
<div class="panel-header">Market Heatmap</div>
<div class="panel-body" id="heatmap"></div>
</div>

<div class="panel">
<div class="panel-header">AI Market Regime</div>
<div class="panel-body" id="regime"></div>
</div>

</div>

</div>

<script>

/* CHART */

let widget

function loadChart(symbol){

widget=new TradingView.widget({

symbol:symbol,
interval:"60",
container_id:"chart",
theme:"dark",
autosize:true

})

}

function changeSymbol(symbol){

loadChart("BINANCE:"+symbol)

}

loadChart("BINANCE:BTCUSDT")

/* INSTITUTIONAL UNIVERSE */

const coins=[

"BTCUSDT",
"ETHUSDT",
"BNBUSDT",
"SOLUSDT",
"DOGEUSDT",
"TONUSDT",
"LINKUSDT",
"TRXUSDT",
"NEARUSDT",
"APTUSDT",
"INJUSDT",
"ARBUSDT",
"SUIUSDT",
"AAVEUSDT",
"HBARUSDT",
"TAOUSDT"

]

coins.forEach(symbol=>{

let div=document.createElement("div")

div.className="coin"
div.innerText=symbol
div.onclick=()=>changeSymbol(symbol)

watchlist.appendChild(div)

})

/* MARKET DATA */

let market=[]
let fundingData=[]

async function loadMarket(){

const res=await fetch(
"https://fapi.binance.com/fapi/v1/ticker/24hr"
)

market=await res.json()

const fund=await fetch(
"https://fapi.binance.com/fapi/v1/premiumIndex"
)

fundingData=await fund.json()

runRadar()
runLiquidity()
updateFunding()
updateHeatmap()
runRegime()

}

/* RADAR */

function runRadar(){

let html=""

coins.forEach(symbol=>{

let asset=market.find(a=>a.symbol===symbol)

if(!asset) return

let volume=Number(asset.quoteVolume)
let move=Math.abs(asset.priceChangePercent)

if(volume<120000000) return

let score=0

if(move>2) score+=20
if(move>3) score+=30
if(move>4) score+=40
if(volume>200000000) score+=20

if(score<40) return

html+=`

<div class="yellow">

${symbol}

Score ${score}

Move ${move.toFixed(2)}%

</div>

`

})

radar.innerHTML=html

}

/* LIQUIDITY ENGINE */

function runLiquidity(){

let html=""

coins.forEach(symbol=>{

let asset=market.find(a=>a.symbol===symbol)
let fund=fundingData.find(f=>f.symbol===symbol)

if(!asset||!fund) return

let move=Math.abs(asset.priceChangePercent)
let volume=Number(asset.quoteVolume)
let funding=Math.abs(fund.lastFundingRate)

if(move>4 && volume>150000000){

html+=`

<div class="orange">

Stop Cluster Risk

${symbol}

Move ${move.toFixed(2)}%

</div>

`

}

if(move>3 && funding>0.0005){

html+=`

<div class="red">

Liquidation Risk

${symbol}

Funding ${(fund.lastFundingRate*100).toFixed(3)}%

</div>

`

}

})

liquidity.innerHTML=html

}

/* FUNDING */

function updateFunding(){

let html=""

fundingData.slice(0,10).forEach(f=>{

html+=`

<div>

${f.symbol}

${(f.lastFundingRate*100).toFixed(3)}%

</div>

`

})

funding.innerHTML=html

}

/* HEATMAP */

function updateHeatmap(){

let html=""

market.slice(0,30).forEach(c=>{

let color=c.priceChangePercent>0?"green":"red"

html+=`<span class="${color}">
${c.symbol}
</span> `

})

heatmap.innerHTML=html

}

/* AI MARKET REGIME */

function runRegime(){

let btc=market.find(a=>a.symbol==="BTCUSDT")

if(!btc) return

let move=btc.priceChangePercent
let volume=Number(btc.quoteVolume)

let regime=""

if(move>2 && volume>150000000) regime="BULL TREND"
else if(move<-2 && volume>150000000) regime="BEAR TREND"
else if(Math.abs(move)<1 && volume>120000000) regime="ACCUMULATION"
else regime="DISTRIBUTION"

regimeDiv.innerHTML=regime

}

/* FIX ID */

const regimeDiv=document.getElementById("regime")

/* LOOPS */

loadMarket()

setInterval(loadMarket,30000)

</script>

</body>

</html>
