<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>BirVal Quant Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<link
href="https://cdn.jsdelivr.net/npm/gridstack@8.2.5/dist/gridstack.min.css"
rel="stylesheet"/>

<script
src="https://cdn.jsdelivr.net/npm/gridstack@8.2.5/dist/gridstack-all.js">
</script>

<style>

body{
background:#0b0f1c;
color:white;
font-family:monospace;
margin:0
}

.header{
padding:6px;
text-align:center;
border-bottom:1px solid #60a5fa
}

.grid-stack{
background:#0f1629
}

.panel{
background:#111827;
border:1px solid #60a5fa;
padding:5px
}

</style>

</head>

<body>

<div class="header">

BirVal Quant Terminal

</div>

<div class="grid-stack">

<div class="grid-stack-item"
gs-w="4"
gs-h="3">

<div class="grid-stack-item-content panel">

<h4>Market Stream</h4>

<div id="stream"></div>

</div>

</div>

<div class="grid-stack-item"
gs-w="4"
gs-h="3">

<div class="grid-stack-item-content panel">

<h4>Dataset Engine</h4>

<div id="dataset"></div>

</div>

</div>

<div class="grid-stack-item"
gs-w="4"
gs-h="3">

<div class="grid-stack-item-content panel">

<h4>Market Regime</h4>

<div id="regime"></div>

</div>

</div>

</div>

<script>

let grid = GridStack.init()

/* WEBSOCKET STREAM */

const socket = new WebSocket(
"wss://fstream.binance.com/ws/btcusdt@trade"
)

socket.onmessage = function(event){

const data = JSON.parse(event.data)

let price = data.p

document.getElementById("stream").innerHTML =
"BTC Price: "+price

}

/* DATASET */

async function loadHistorical(){

const res = await fetch(
"https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=200"
)

const data = await res.json()

document.getElementById("dataset").innerHTML =
"Candles loaded: "+data.length

}

loadHistorical()

/* MARKOV REGIME */

async function loadMarket(){

const res = await fetch(
"https://fapi.binance.com/fapi/v1/ticker/24hr"
)

const market = await res.json()

let btc = market.find(a=>a.symbol=="BTCUSDT")

let change = btc.priceChangePercent

let regime = "SIDEWAYS"

if(change>2) regime="BULL TREND"
if(change<-2) regime="BEAR TREND"

document.getElementById("regime").innerHTML = regime

}

setInterval(loadMarket,5000)

</script>

</body>

</html>
