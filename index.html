<!DOCTYPE html>
<html>

<head>

<title>BirVal Quant Terminal</title>

<style>

body{
    background:#061321;
    color:#9cc9ff;
    font-family: monospace;
    padding:20px;
}

h2{
    color:#8fc1ff;
}

.panel{

    border:1px solid #1c395a;
    padding:15px;
    margin-bottom:20px;

}

</style>

</head>


<body>

<h2>BirVal Quant Terminal</h2>



<div class="panel">

</div>

</div>



<div class="panel">

<div id="regimePanel">

<script type="module">

import { startDataEngine } from "./data/data_engine.js";

console.log("BirVal Terminal loading...");

document.addEventListener("DOMContentLoaded", () => {

    console.log("DOM loaded");

    try{

        startDataEngine();

        console.log("Data Engine started");

    }

    catch(error){

        console.error("ENGINE ERROR:", error);

    }

});
