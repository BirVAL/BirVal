<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>BirVal Quant Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<link href="https://cdn.jsdelivr.net/npm/gridstack@8.2.5/dist/gridstack.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/gridstack@8.2.5/dist/gridstack-all.js"></script>

<style>

body{
background:#0b0f1c;
color:white;
font-family:monospace;
margin:0;
}

.header{
padding:6px;
text-align:center;
border-bottom:1px solid #60a5fa;
color:#93c5fd;
}

.grid-stack{
background:#0f1629;
padding:5px;
}

.panel{
background:#111827;
border:1px solid #60a5fa;
}

.panel-header{
padding:6px;
cursor:pointer;
border-bottom:1px solid #60a5fa;
color:#93c5fd;
}

.panel-content{
padding:8px;
display:block;
font-size:12px;
}

</style>

</head>

<body>

<div class="header">

BirVal Quant Terminal

</div>

<div class="grid-stack">

<div class="grid-stack-item" gs-w="4" gs-h="2">
<div class="grid-stack-item-content panel">

<div class="panel-header" onclick="togglePanel('streamPanel')">
Market Stream
</div>

<div class="panel-content" id="streamPanel">

Waiting data...

</div>

</div>
</div>


<div class="grid-stack-item" gs-w="4" gs-h="2">
<div class="grid-stack-item-content panel">

<div class="panel-header" onclick="togglePanel('datasetPanel')">
Dataset Engine
</div>

<div class="panel-content" id="datasetPanel">

Loading dataset...

</div>

</div>
</div>


<div class="grid-stack-item" gs-w="4" gs-h="2">
<div class="grid-stack-item-content panel">

<div class="panel-header" onclick="togglePanel('regimePanel')">
Market Regime
</div>

<div class="panel-content" id="regimePanel">

Calculating...

</div>

</div>
</div>

</div>


<script>

/* GRIDSTACK */

let grid = GridStack.init({
float:true
})

/* PANEL TOGGLE */

function togglePanel(id){

let el = document.getElementById(id)

if(el.style.display === "none"){

el.style.display="block"

}else{

el.style.display="none"

}

}

/* WEBSOCKET STREAM */

const socket = new WebSocket(
"wss://fstream.binance.com/ws/btcusdt@trade"
)

socket.onmessage = function(event){

const data = JSON.parse(event.data)

let price = data.p
let qty = data.q

document.getElementById("streamPanel").innerHTML =

"BTC Price: "+price+
"<br>Trade Size: "+qty

}

/* DATASET ENGINE */

async function loadHistorical(){

const res = await fetch(
"https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=200"
)

const data = await res.json()

document.getElementById("datasetPanel").innerHTML =

"Candles loaded: "+data.length

}

loadHistorical()


/* MARKET REGIME ENGINE */

async function loadMarket(){

const res = await fetch(
"https://fapi.binance.com/fapi/v1/ticker/24hr"
)

const market = await res.json()

let btc = market.find(a=>a.symbol=="BTCUSDT")

let change = btc.priceChangePercent

let regime = "SIDEWAYS"

if(change>2) regime="BULL TREND"
if(change<-2) regime="BEAR TREND"

document.getElementById("regimePanel").innerHTML = regime

}

setInterval(loadMarket,5000)

</script>

</body>

</html>
